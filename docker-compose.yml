version: '3.8'

services:
  # 前端应用
  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - VITE_API_URL=http://localhost:8080
    depends_on:
      - api
    networks:
      - math-demo-network

  # Node.js API 服务
  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - NODE_ENV=production
      - PORT=8080
      - PARSER_URL=http://parser:8000
      - LOG_LEVEL=info
    volumes:
      - ./uploads:/app/uploads
      - ./exports:/app/exports
    depends_on:
      - parser
    networks:
      - math-demo-network

  # Python 解析服务
  parser:
    build:
      context: ./apps/parser
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
    volumes:
      - ./uploads:/app/uploads
      - ./exports:/app/exports
    networks:
      - math-demo-network

networks:
  math-demo-network:
    driver: bridge

volumes:
  uploads:
  exports:
